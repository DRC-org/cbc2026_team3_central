robot_name: main_hand

can_buses:
  m3508_bus: can0
  edulite_bus: can1
  generic_bus: can2

health:
  feedback_timeout_ms: 500   # この時間フィードバックなければ STALE
  temp_warning_c: 65         # この温度で WARNING
  temp_critical_c: 80        # この温度で FAULT
  tx_error_threshold: 96     # CAN error_passive 境界
  # bus_check_interval_ms は将来の独立ヘルスチェックループ用 (現状未使用)

motor_check:
  per_motor_timeout_ms: 1500   # 1 モータあたりのタイムアウト
  default_magnitude:
    m3508: 500                 # mA
    edulite05: 5.0             # deg
    generic: 0.1               # POSITION/VELOCITY/DUTY 共通の小さい目標値
  # tolerance はドライバ側のデフォルト (1deg / 5rpm 等) を採用。
  # 個別上書きしたい場合は motors[name].motor_check で行う。

motors:
  # DJI M3508 (C620 ESC) — CAN Standard Frame
  lift_motor:
    driver: m3508
    bus: m3508_bus
    can_id: 1

  # RobStride EDULITE 05 — CAN Extended Frame
  arm_joint:
    driver: edulite05
    bus: edulite_bus
    can_id: 1
    mode: position

  # 自作モータドライバ — CAN Standard Frame
  gripper:
    driver: generic
    bus: generic_bus
    can_id: 0x01
    control_type: position
