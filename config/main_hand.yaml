robot_name: main_hand

can_buses:
  m3508_bus: can0
  edulite_bus: can1
  generic_bus: can2

health:
  feedback_timeout_ms: 500   # この時間フィードバックなければ STALE
  temp_warning_c: 65         # この温度で WARNING
  temp_critical_c: 80        # この温度で FAULT
  tx_error_threshold: 96     # CAN error_passive 境界
  # bus_check_interval_ms は将来の独立ヘルスチェックループ用 (現状未使用)

